version: '3.9'

services:
  # ─────────────────────────────────────────────
  # PostgreSQL — used by the API and Worker
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: agenthub_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: agenthub
      POSTGRES_PASSWORD: agenthub_password
      POSTGRES_DB: agent_hub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agenthub -d agent_hub"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Redis — used by BullMQ in the Worker
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: agenthub_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
